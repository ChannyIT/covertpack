name: Yêu Cầu Chuyển Đổi
on:
  issues:
    types:
      - opened
      - edited
      - reopened

concurrency:
  group: conversion-request-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  get-pack-info:
    name: Phân tích yêu cầu chuyển đổi
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'conversion') && github.event.issue.state == 'open'
    permissions:
      issues: read
    timeout-minutes: 2
    outputs:
      pack_url: ${{ steps.organize-inputs.outputs.PACK_URL }}
      default_pack_url: ${{ steps.organize-inputs.outputs.DEFAULT_PACK_URL }}
      merge_pack_url: ${{ steps.organize-inputs.outputs.MERGE_PACK_URL }}
      default_assets_version: ${{ steps.organize-inputs.outputs.DEFAULT_ASSETS_VERSION }}
      block_material: ${{ steps.organize-inputs.outputs.BLOCK_MATERIAL }}
      attachable_material: ${{ steps.organize-inputs.outputs.ATTACHABLE_MATERIAL }}
      archive_scratch: ${{ steps.organize-inputs.outputs.ARCHIVE_SCRATCH }}
      rename_model_files: ${{ steps.organize-inputs.outputs.RENAME_MODEL_FILES }}
      font_conversion: ${{ steps.organize-inputs.outputs.FONT_CONVERSION }}
      armor_conversion: ${{ steps.organize-inputs.outputs.ARMOR_CONVERSION }}
      meg3_fix: ${{ steps.organize-inputs.outputs.MEG3_FIX }}
      sounds_conversion: ${{ steps.organize-inputs.outputs.SOUNDS_CONVERSION }}
      bow_conversion: ${{ steps.organize-inputs.outputs.BOW_CONVERSION }}
      shield_conversion: ${{ steps.organize-inputs.outputs.SHIELD_CONVERSION }}
      block_conversion: ${{ steps.organize-inputs.outputs.BLOCK_CONVERSION }}
    steps:
      - name: Phân tích biểu mẫu Issue
        id: parse-issue
        uses: zentered/issue-forms-body-parser@v2.2.0
        continue-on-error: true
      - name: Chuẩn hoá tham số đầu vào
        id: organize-inputs
        run: |
          set -euo pipefail

          # Link đính kèm nội bộ GitHub (kết quả kéo-thả hoặc upload trực tiếp)
          GITHUB_ATTACHMENT_REGEX='https?://(github\.com/user-attachments/(files|assets)/|github\.com/[^/]+/[^/]+/assets/[0-9]+/|user-images\.githubusercontent\.com/|private-user-images\.githubusercontent\.com/)[^[:space:])>]+'
          # Bất kỳ URL nào
          ANY_URL_REGEX='https?://[^[:space:])>]+'

          # Trích xuất URL từ text: ưu tiên GitHub attachment, fallback bất kỳ URL nào
          extract_url_from_text() {
            local text="${1:-}"
            if [[ -z "${text}" ]]; then
              return 0
            fi
            # Ưu tiên 1: link đính kèm nội bộ GitHub (kéo-thả)
            local github_url
            github_url="$(printf '%s' "${text}" | grep -Eo "${GITHUB_ATTACHMENT_REGEX}" | head -n 1 || true)"
            if [[ -n "${github_url}" ]]; then
              printf '%s' "${github_url}"
              return 0
            fi
            # Ưu tiên 2: bất kỳ URL nào (Dropbox, MediaFire, Google Drive direct link, CDN, v.v.)
            printf '%s' "${text}" | grep -Eo "${ANY_URL_REGEX}" | head -n 1 || true
          }

          extract_section_text() {
            local heading="${1:-}"
            local body="${2:-}"
            if [[ -z "${heading}" || -z "${body}" ]]; then
              return 0
            fi

            printf '%s\n' "${body}" | awk -v h="### ${heading}" '
              BEGIN { capture = 0 }
              $0 == h { capture = 1; next }
              /^### / { if (capture == 1) exit }
              capture == 1 { print }
            '
          }

          normalize_url_value() {
            local value="${1:-}"
            if [[ -z "${value}" || "${value}" == "null" ]]; then
              printf 'null'
            else
              printf '%s' "${value}"
            fi
          }

          cat > parse-form.jq <<'JQ'
          def ensure_object:
            if type == "object" then .
            elif type == "string" then
              (try (fromjson | if type == "object" then . else {} end) catch {})
            else
              {}
            end;

          # Link đính kèm nội bộ GitHub
          def github_attachment_regex:
            "https?://(?:github\\.com/user-attachments/(?:files|assets)/|github\\.com/[^/]+/[^/]+/assets/[0-9]+/|user-images\\.githubusercontent\\.com/|private-user-images\\.githubusercontent\\.com/)[^\\s\\)>]+";

          # Bất kỳ URL nào
          def any_url_regex:
            "https?://[^\\s\\)>]+";

          def field_text($form; $id):
            ($form[$id] // "") as $field
            | if ($field | type) == "object" then
                ($field.text // $field.value // "")
              elif ($field | type) == "array" then
                ($field | map(tostring) | join(" "))
              elif $field == null then
                ""
              else
                ($field | tostring)
              end;

          def normalize($input):
            if ($input == null) then "" else ($input | tostring | gsub("\\\\";"")) end
            | if (startswith("\"") and endswith("\"") and (length >= 2)) then .[1:-1] else . end
            | gsub("\r"; "")
            | gsub("\n"; " ");

          def is_blank($text):
            ($text == "" or $text == "*No response*" or $text == "*Không có phản hồi*" or $text == "None" or $text == "null");

          # Trích xuất URL: ưu tiên GitHub attachment, fallback bất kỳ URL nào
          def extract_url($input):
            (normalize($input)) as $text
            | if is_blank($text) then "null"
              else
                # Ưu tiên 1: link đính kèm nội bộ GitHub
                ([ $text | scan(github_attachment_regex) ]) as $github_matches
                | if ($github_matches | length) > 0 then $github_matches[0]
                  else
                    # Ưu tiên 2: bất kỳ URL nào (direct link từ mọi nguồn)
                    ([ $text | scan(any_url_regex) ]) as $any_matches
                    | if ($any_matches | length) > 0 then $any_matches[0]
                      else "null"
                      end
                  end
              end;

          def pick($input; $default):
            (normalize($input)) as $text
            | if is_blank($text) then $default else $text end;

          ensure_object as $form
          |
          {
            "pack_url": extract_url(field_text($form; "java-pack-upload")),
            "default_pack_url": extract_url(field_text($form; "default-pack-upload")),
            "merge_pack_url": extract_url(field_text($form; "bedrock-merge-pack-upload")),
            "default_assets_version": pick(field_text($form; "default-assets-version"); "1.21.5"),
            "block_material": pick(field_text($form; "block-material"); "alpha_test"),
            "attachable_material": pick(field_text($form; "attachable-material"); "entity_alphatest_one_sided"),
            "archive_scratch": pick(field_text($form; "archive-scratch-files"); "false"),
            "rename_model_files": pick(field_text($form; "rename-model-files"); "false"),
            "font_conversion": pick(field_text($form; "font-conversion"); "auto"),
            "armor_conversion": pick(field_text($form; "armor-conversion"); "auto"),
            "meg3_fix": pick(field_text($form; "meg3-fix"); "auto"),
            "sounds_conversion": pick(field_text($form; "sounds-conversion"); "auto"),
            "bow_conversion": pick(field_text($form; "bow-conversion"); "auto"),
            "shield_conversion": pick(field_text($form; "shield-conversion"); "auto"),
            "block_conversion": pick(field_text($form; "block-conversion"); "auto")
          }
          JQ

          echo '${{ toJSON(steps.parse-issue.outputs.data) }}' | jq -f parse-form.jq > inputs.json

          ISSUE_BODY="$(jq -r '.issue.body // ""' "${GITHUB_EVENT_PATH}")"

          PACK_URL="$(jq -r '.pack_url // "null"' inputs.json)"
          DEFAULT_PACK_URL="$(jq -r '.default_pack_url // "null"' inputs.json)"
          MERGE_PACK_URL="$(jq -r '.merge_pack_url // "null"' inputs.json)"

          # Fallback: parse lại từ raw issue body nếu jq parser không nhận được dữ liệu
          if [[ "${PACK_URL}" == "null" || -z "${PACK_URL}" ]]; then
            PACK_URL="$(extract_url_from_text "$(extract_section_text 'Tệp Java Pack (bắt buộc)' "${ISSUE_BODY}")")"
          fi

          if [[ "${DEFAULT_PACK_URL}" == "null" || -z "${DEFAULT_PACK_URL}" ]]; then
            DEFAULT_PACK_URL="$(extract_url_from_text "$(extract_section_text 'Tệp Gói Mặc Định (tuỳ chọn)' "${ISSUE_BODY}")")"
          fi

          if [[ "${MERGE_PACK_URL}" == "null" || -z "${MERGE_PACK_URL}" ]]; then
            MERGE_PACK_URL="$(extract_url_from_text "$(extract_section_text 'Tệp Gói Bedrock Để Gộp (tuỳ chọn)' "${ISSUE_BODY}")")"
          fi

          # Fallback cuối: quét toàn bộ body
          if [[ "${PACK_URL}" == "null" || -z "${PACK_URL}" ]]; then
            PACK_URL="$(extract_url_from_text "${ISSUE_BODY}")"
          fi

          if [[ "${DEFAULT_PACK_URL}" == "null" || -z "${DEFAULT_PACK_URL}" ]]; then
            DEFAULT_PACK_URL="null"
          fi

          if [[ "${MERGE_PACK_URL}" == "null" || -z "${MERGE_PACK_URL}" ]]; then
            MERGE_PACK_URL="null"
          fi

          if [[ "${PACK_URL}" == "null" || -z "${PACK_URL}" ]]; then
            echo "Không tìm thấy tệp hợp lệ cho Java Pack."
            echo "Hãy kéo-thả tệp vào trường 'Tệp Java Pack (bắt buộc)', hoặc dán direct link tải thẳng tệp vào đó."
            exit 1
          fi

          PACK_URL="$(normalize_url_value "${PACK_URL}")"
          DEFAULT_PACK_URL="$(normalize_url_value "${DEFAULT_PACK_URL}")"
          MERGE_PACK_URL="$(normalize_url_value "${MERGE_PACK_URL}")"

          echo "Resolved PACK_URL: ${PACK_URL}"
          echo "Resolved DEFAULT_PACK_URL: ${DEFAULT_PACK_URL}"
          echo "Resolved MERGE_PACK_URL: ${MERGE_PACK_URL}"

          echo "PACK_URL=${PACK_URL}" >> $GITHUB_OUTPUT
          echo "DEFAULT_PACK_URL=${DEFAULT_PACK_URL}" >> $GITHUB_OUTPUT
          echo "MERGE_PACK_URL=${MERGE_PACK_URL}" >> $GITHUB_OUTPUT
          echo "DEFAULT_ASSETS_VERSION=$(jq -r '.default_assets_version' inputs.json)" >> $GITHUB_OUTPUT
          echo "BLOCK_MATERIAL=$(jq -r '.block_material' inputs.json)" >> $GITHUB_OUTPUT
          echo "ATTACHABLE_MATERIAL=$(jq -r '.attachable_material' inputs.json)" >> $GITHUB_OUTPUT
          echo "ARCHIVE_SCRATCH=$(jq -r '.archive_scratch' inputs.json)" >> $GITHUB_OUTPUT
          echo "RENAME_MODEL_FILES=$(jq -r '.rename_model_files' inputs.json)" >> $GITHUB_OUTPUT
          echo "FONT_CONVERSION=$(jq -r '.font_conversion' inputs.json)" >> $GITHUB_OUTPUT
          echo "ARMOR_CONVERSION=$(jq -r '.armor_conversion' inputs.json)" >> $GITHUB_OUTPUT
          echo "MEG3_FIX=$(jq -r '.meg3_fix' inputs.json)" >> $GITHUB_OUTPUT
          echo "SOUNDS_CONVERSION=$(jq -r '.sounds_conversion' inputs.json)" >> $GITHUB_OUTPUT
          echo "BOW_CONVERSION=$(jq -r '.bow_conversion' inputs.json)" >> $GITHUB_OUTPUT
          echo "SHIELD_CONVERSION=$(jq -r '.shield_conversion' inputs.json)" >> $GITHUB_OUTPUT
          echo "BLOCK_CONVERSION=$(jq -r '.block_conversion' inputs.json)" >> $GITHUB_OUTPUT

  convert-pack:
    name: Chạy chuyển đổi pack
    runs-on: ubuntu-latest
    needs: get-pack-info
    permissions:
      contents: read
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bật cache tài nguyên mặc định
        id: cache-default-assets
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/staging/default_assets.zip
          key: ${{ runner.os }}-${{ needs.get-pack-info.outputs.default_assets_version }}
      - name: Cài đặt NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cài đặt phụ thuộc
        run: |
          sudo apt-get update || sudo apt-get update --fix-missing
          sudo apt-get install -y moreutils zip imagemagick jq
          yarn global add spritesheet-js
          pip install Pillow requests jproperties pyyaml
      - name: Chuyển đổi pack
        id: convert-pack
        continue-on-error: false
        env:
          PACK_URL: ${{ needs.get-pack-info.outputs.pack_url }}
          DEFAULT_PACK_URL: ${{ needs.get-pack-info.outputs.default_pack_url }}
          MERGE_PACK_URL: ${{ needs.get-pack-info.outputs.merge_pack_url }}
          DEFAULT_ASSETS_VERSION: ${{ needs.get-pack-info.outputs.default_assets_version }}
          BLOCK_MATERIAL: ${{ needs.get-pack-info.outputs.block_material }}
          ATTACHABLE_MATERIAL: ${{ needs.get-pack-info.outputs.attachable_material }}
          ARCHIVE_SCRATCH: ${{ needs.get-pack-info.outputs.archive_scratch }}
          RENAME_MODEL_FILES: ${{ needs.get-pack-info.outputs.rename_model_files }}
          FONT_CONVERSION: ${{ needs.get-pack-info.outputs.font_conversion }}
          ARMOR_CONVERSION: ${{ needs.get-pack-info.outputs.armor_conversion }}
          MEG3_FIX: ${{ needs.get-pack-info.outputs.meg3_fix }}
          SOUNDS_CONVERSION: ${{ needs.get-pack-info.outputs.sounds_conversion }}
          BOW_CONVERSION: ${{ needs.get-pack-info.outputs.bow_conversion }}
          SHIELD_CONVERSION: ${{ needs.get-pack-info.outputs.shield_conversion }}
          BLOCK_CONVERSION: ${{ needs.get-pack-info.outputs.block_conversion }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p staging

          # Hàm download: chỉ gửi Authorization header cho GitHub URLs
          download_file() {
            local url="${1}"
            local output="${2}"
            if printf '%s' "${url}" | grep -Eq '^https?://([a-z0-9-]+\.)?(github\.com|githubusercontent\.com)/'; then
              COLUMNS=$COLUMNS-1 curl --no-styled-output -#fL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -o "${output}" "${url}"
            else
              COLUMNS=$COLUMNS-1 curl --no-styled-output -#fL \
                -o "${output}" "${url}"
            fi
          }

          download_file "${PACK_URL}" staging/input_pack.zip

          FALLBACK_INPUT_VALUE="null"
          if [ "${DEFAULT_PACK_URL}" != "null" ]; then
            download_file "${DEFAULT_PACK_URL}" staging/default_pack.zip
            FALLBACK_INPUT_VALUE="file://$(pwd)/staging/default_pack.zip"
          fi

          MERGE_INPUT_VALUE="null"
          if [ "${MERGE_PACK_URL}" != "null" ]; then
            download_file "${MERGE_PACK_URL}" staging/merge_pack.zip
            MERGE_INPUT_VALUE="merge_pack.zip"
          fi

          pushd staging >/dev/null

          export AUTO_MODE="true"
          export WARN="false"
          export MERGE_INPUT="${MERGE_INPUT_VALUE}"
          export ATTACHABLE_MATERIAL="${ATTACHABLE_MATERIAL}"
          export BLOCK_MATERIAL="${BLOCK_MATERIAL}"
          export FALLBACK_PACK="${FALLBACK_INPUT_VALUE}"
          export DEFAULT_ASSET_VERSION="${DEFAULT_ASSETS_VERSION}"
          export RENAME_MODEL_FILES="${RENAME_MODEL_FILES}"
          export SAVE_SCRATCH="${ARCHIVE_SCRATCH}"
          export DISABLE_ULIMIT="true"

          bash ../converter.sh input_pack.zip

          popd >/dev/null

      - name: Tải artifact kết quả chính
        uses: actions/upload-artifact@v4
        with:
          name: KetQuaChuyenDoi-issue-${{ github.event.issue.number }}-run-${{ github.run_id }}
          path: |
            staging/target/packaged/geyser_resources.mcpack
            staging/target/packaged/geyser_addon.mcaddon
            staging/target/geyser_mappings.json
          if-no-files-found: warn

      - name: Tải artifact chẩn đoán
        uses: actions/upload-artifact@v4
        with:
          name: ChanDoan-issue-${{ github.event.issue.number }}-run-${{ github.run_id }}
          path: |
            staging/target/reports/*.json
            staging/target/scratch_files.zip
            staging/config.json
            staging/plugin_context.json
            staging/*_map.json
          if-no-files-found: ignore

  post-result:
    name: Gửi kết quả thành công
    runs-on: ubuntu-latest
    needs: convert-pack
    timeout-minutes: 2
    permissions:
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Gửi kết quả
        id: post-result
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## :sparkles: Workflow đã hoàn tất! :sparkles:
            - Tải các tệp kết quả tại trang [lần chạy workflow][1]. :arrow_double_down:
            - Chép `geyser_resources.mcpack` vào thư mục `packs` của Geyser. :file_folder:
            - Chép `geyser_mappings.json` vào thư mục `custom_mappings` của Geyser. :page_with_curl:

            > Artifact **`KetQuaChuyenDoi-*`** chứa file bạn cần dùng.
            > Artifact **`ChanDoan-*`** chứa log/báo cáo kỹ thuật (chỉ cần khi debug lỗi).

            Nếu có lỗi ở tệp chuyển đổi, vui lòng kiểm tra log của workflow và tạo báo lỗi nếu bạn nghĩ converter có vấn đề.
            Yêu cầu này sẽ được đóng tự động.

            [1]: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id}}
          reactions: 'rocket'
      - name: Đóng issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}

  conversion-failed:
    name: Gửi thông báo thất bại
    runs-on: ubuntu-latest
    needs: [get-pack-info, convert-pack, post-result]
    if: |
      always() &&
      contains(github.event.issue.labels.*.name, 'conversion') &&
      github.event.issue.state == 'open' &&
      (
        needs.get-pack-info.result == 'failure' ||
        needs.convert-pack.result == 'failure' ||
        needs.post-result.result == 'failure'
      )
    timeout-minutes: 2
    permissions:
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Gửi thông báo lỗi
        id: post-result
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ## :stop_sign: Workflow đã thất bại :stop_sign:
            - Kiểm tra lỗi tại trang [lần chạy workflow][1]. :clipboard:
            - Trạng thái từng job:
              - Lấy thông tin pack: *${{ needs.get-pack-info.result }}*
              - Chuyển đổi pack: *${{ needs.convert-pack.result }}*
              - Gửi kết quả: *${{ needs.post-result.result }}*

            Nếu bạn cho rằng đây là lỗi của converter, vui lòng tạo báo lỗi.
            Yêu cầu này sẽ được đóng tự động.

            [1]: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id}}
          reactions: 'x'
      - name: Đóng issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
