name: Chuyển Đổi Pack
description: Yêu cầu chuyển đổi pack tự động
title: "[Yêu Cầu Chuyển Đổi]: "
labels: ["conversion"]
body:
  - type: markdown
    attributes:
      value: |
        ## Hướng dẫn gửi tệp
        Mỗi ô upload hỗ trợ **hai phương thức — chọn một trong hai**:

        **① Kéo-thả tệp** — kéo tệp thả thẳng vào ô bên dưới.
        GitHub sẽ tự upload và chèn liên kết đính kèm nội bộ vào ô đó.

        **② Dán direct link** — dán URL tải thẳng vào ô (link phải mở ra là tải ngay file, không qua trang trung gian).
        > 💡 Ví dụ link hợp lệ:
        > `https://github.com/user/repo/releases/download/v1.0/pack.zip`
        > `https://cdn.example.com/files/my-pack.zip`
        >
        > ❌ **Không hợp lệ:** link trang chia sẻ Google Drive, MediaFire web, Dropbox share — phải là **link tải trực tiếp file**.

        ✅ Định dạng tệp được chấp nhận: `.zip`, `.jar`, `.mcpack`.

  - type: textarea
    id: java-pack-upload
    attributes:
      label: Tệp Java Pack (bắt buộc)
      description: >-
        Kéo-thả tệp .zip/.jar/.mcpack vào ô này — HOẶC — dán direct link tải thẳng tệp vào đây.
        Bạn có thể thêm ghi chú kèm theo nếu cần.
      placeholder: |-
        Kéo-thả tệp .zip/.jar/.mcpack vào đây
        ─── HOẶC ───
        Dán direct link: https://example.com/my-java-pack.zip
    validations:
      required: true

  - type: textarea
    id: default-pack-upload
    attributes:
      label: Tệp Gói Mặc Định (tuỳ chọn)
      description: >-
        Tệp gói Java dùng làm gói dự phòng trước khi dùng tài nguyên mặc định của Minecraft.
        Kéo-thả tệp vào đây — HOẶC — dán direct link tải thẳng tệp.
      placeholder: |-
        Kéo-thả tệp dự phòng vào đây
        ─── HOẶC ───
        Dán direct link: https://example.com/fallback.zip
    validations:
      required: false

  - type: textarea
    id: bedrock-merge-pack-upload
    attributes:
      label: Tệp Gói Bedrock Để Gộp (tuỳ chọn)
      description: >-
        Tệp gói tài nguyên Bedrock để gộp vào gói sau chuyển đổi.
        Kéo-thả tệp .mcpack/.zip vào đây — HOẶC — dán direct link tải thẳng tệp.
      placeholder: |-
        Kéo-thả tệp .mcpack/.zip vào đây
        ─── HOẶC ───
        Dán direct link: https://example.com/bedrock-merge.mcpack
    validations:
      required: false

  - type: checkboxes
    id: upload-confirm
    attributes:
      label: Xác Nhận Cách Gửi Tệp
      description: Xác nhận rằng bạn đã gửi tệp đúng cách để workflow có thể tải tự động.
      options:
        - label: >-
            Tôi đã gửi tệp bằng một trong hai cách hợp lệ: kéo-thả trực tiếp vào biểu mẫu
            (GitHub đính kèm nội bộ), hoặc dán direct link tải thẳng (mở link là tải ngay file,
            không qua trang trung gian).
          required: true

  - type: dropdown
    id: default-assets-version
    attributes:
      label: Phiên Bản Tài Nguyên Mặc Định
      description: Chọn phiên bản tài nguyên mặc định muốn dùng cho quá trình chuyển đổi. Nếu bỏ trống sẽ dùng `26.2`.
      options:
        - 1.13.2
        - 1.14.4
        - 1.15.2
        - 1.16.5
        - 1.17.1
        - 1.18.2
        - 1.19.2
        - 1.19.3
        - 1.19.4
        - '1.20'
        - 1.20.1
        - 1.20.2
        - 1.20.4
        - 1.20.6
        - '1.21'
        - 1.21.1
        - 1.21.2
        - 1.21.3
        - 1.21.4
        - 1.21.5
        - '26.1'
        - 26.1.1
        - 26.1.2
        - '26.2'
    validations:
      required: false

  - type: dropdown
    id: block-material
    attributes:
      label: Vật Liệu Block
      description: |
        Chọn vật liệu block dùng trong quá trình chuyển đổi. Nếu không chọn sẽ dùng `alpha_test`.
        Xem thêm tại [Bedrock Wiki](https://wiki.bedrock.dev/blocks/block-materials.html).
          - `opaque`: không hỗ trợ pixel trong suốt/bán trong suốt, chỉ render mặt ngoài
          - `alpha_test`: hỗ trợ pixel trong suốt, chỉ render mặt ngoài
          - `blend`: hỗ trợ pixel bán trong suốt, chỉ render mặt ngoài
          - `double_sided`: không hỗ trợ trong suốt/bán trong suốt, render cả 2 mặt
      options:
        - opaque
        - alpha_test
        - blend
        - double_sided
    validations:
      required: false

  - type: dropdown
    id: attachable-material
    attributes:
      label: Vật Liệu Attachable
      description: |
        Chọn vật liệu attachable dùng trong quá trình chuyển đổi. Nếu không chọn sẽ dùng `entity_alphatest_one_sided`.
        Xem thêm tại [Bedrock Wiki](https://wiki.bedrock.dev/documentation/materials.html).
          - `entity`: vật liệu đục cơ bản, không hỗ trợ pixel trong suốt/bán trong suốt
          - `entity_alphatest`: hỗ trợ trong suốt nhưng thiếu ẩn mặt sau, dễ gây chồng hình
          - `entity_alphablend`: hỗ trợ bán trong suốt và có ẩn mặt sau
          - `entity_alphatest_one_sided`: hỗ trợ trong suốt và có ẩn mặt sau
      options:
        - entity
        - entity_alphatest
        - entity_alphablend
        - entity_alphatest_one_sided
        - entity_emissive_alpha_one_sided
    validations:
      required: false

  - type: dropdown
    id: archive-scratch-files
    attributes:
      label: Lưu Trữ Tệp Scratch
      description: |
        Có lưu trữ tệp scratch không? Nếu bật, workflow sẽ tạo file zip chứa tệp tạm dùng khi chuyển đổi.
        Mặc định: `false`.
      options:
        - 'true'
        - 'false'

  - type: dropdown
    id: rename-model-files
    attributes:
      label: Đổi Tên Tệp Model
      description: |
        Có đổi tên tệp model để giảm độ dài đường dẫn không? Mặc định: `false`.
      options:
        - 'true'
        - 'false'

  - type: dropdown
    id: font-conversion
    attributes:
      label: Chuyển Đổi Font
      description: |
        Bật chuyển đổi font (có thể phát sinh lỗi). Mặc định `auto` (tự phát hiện theo pack).
      options:
        - auto
        - 'true'
        - 'false'

  - type: dropdown
    id: armor-conversion
    attributes:
      label: Chuyển Đổi Armor
      description: |
        Bật chuyển đổi armor (chủ yếu cho ItemsAdder). Mặc định `auto` (tự phát hiện theo pack).
      options:
        - auto
        - 'true'
        - 'false'

  - type: dropdown
    id: meg3-fix
    attributes:
      label: Sửa Lỗi Meg3
      description: |
        Sửa lỗi model đen cho MEG3. Mặc định `auto` (chỉ bật khi phát hiện ModelEngine).
      options:
        - auto
        - 'true'
        - 'false'

  - type: dropdown
    id: sounds-conversion
    attributes:
      label: Chuyển Đổi Âm Thanh
      description: |
        Bật chuyển đổi âm thanh. Mặc định `auto` (tự phát hiện theo pack).
      options:
        - auto
        - 'true'
        - 'false'

  - type: dropdown
    id: bow-conversion
    attributes:
      label: Chuyển Đổi Cung
      description: |
        Bật chuyển đổi cung. Mặc định `auto` (tự phát hiện theo pack).
      options:
        - auto
        - 'true'
        - 'false'

  - type: dropdown
    id: shield-conversion
    attributes:
      label: Chuyển Đổi Khiên
      description: |
        Bật chuyển đổi khiên. Mặc định `auto`, **chưa sẵn sàng cho môi trường chạy thật**.
      options:
        - auto
        - 'true'
        - 'false'

  - type: dropdown
    id: block-conversion
    attributes:
      label: Chuyển Đổi Block
      description: |
        Bật chuyển đổi block. Mặc định `auto` (tự phát hiện theo pack).
      options:
        - auto
        - 'true'
        - 'false'

  - type: checkboxes
    id: terms
    attributes:
      label: Quy Tắc Ứng Xử
      description: |
        Khi gửi issue này, bạn đồng ý tuân thủ Quy Tắc Ứng Xử của dự án.
        Bạn cũng xác nhận rằng bạn sở hữu hoặc có quyền sử dụng toàn bộ tài nguyên đã gửi trong biểu mẫu.
      options:
        - label: Tôi đồng ý tuân thủ Quy Tắc Ứng Xử của dự án và có quyền sử dụng toàn bộ tài nguyên đã gửi.
          required: true
          
